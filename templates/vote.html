<!DOCTYPE html>
<html>

<head>

<title>Vote</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background: linear-gradient(135deg,#141e30,#243b55);
min-height:100vh;
font-family:'Segoe UI',sans-serif;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:40px;
}

.page-container{
width:90%;
max-width:1100px;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border:none;
border-radius:18px;
color:white;
padding:20px;
text-align:center;
transition:0.3s;
box-shadow:0 8px 20px rgba(0,0,0,0.35);
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 12px 30px rgba(0,0,0,0.45);
}

.candidate-photo{
height:190px;
object-fit:cover;
border-radius:12px;
margin-bottom:10px;
}

.symbol{
width:55px;
margin-top:8px;
margin-bottom:10px;
}

.party{
color:#ffd166;
font-weight:500;
margin-bottom:8px;
}

.vote-btn{
background:#28a745;
border:none;
border-radius:10px;
padding:10px;
font-weight:600;
}

.vote-btn:hover{
background:#218838;
}

.logout{
position:absolute;
top:20px;
right:30px;
}

</style>

</head>

<body>

<a href="/logout" class="btn btn-danger logout">Logout</a>

<div class="page-container">

<h2 class="text-center mb-4">Select Your Candidate</h2>

{% if message %}
<div class="alert alert-warning text-center">
{{ message }}
</div>
{% endif %}

<div class="row g-4">

{% for c in candidates %}

<div class="col-md-4">

<div class="card">

<img src="{{ url_for('static', filename='images/' + c[4]) }}" class="candidate-photo">

<h4>{{ c[2] }}</h4>

<div class="party">
Party : {{ c[3] }}
</div>

<img src="{{ url_for('static', filename='images/' + c[5]) }}" class="symbol">

<form method="POST">

{% if message and "already" in message.lower() %}

<button class="btn btn-secondary w-100 mt-2" disabled>
Already Voted
</button>

{% else %}

<button class="btn vote-btn w-100 mt-2" name="candidate" value="{{ c[2] }}">
Vote
</button>

{% endif %}

</form>

</div>

</div>

{% endfor %}

</div>

</div>

</body>

</html>
