<!DOCTYPE html>
<html>

<head>

<title>Election Results</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
padding:40px;
font-family:'Segoe UI',sans-serif;
color:white;
}

.chart-box{
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.winner-box{
background:linear-gradient(135deg,#ffd166,#ffb703);
padding:30px;
border-radius:20px;
text-align:center;
margin-bottom:30px;
color:black;
}

</style>

</head>

<body>

<div class="container">

<div class="text-end mb-3">
<a href="/logout" class="btn btn-danger">Logout</a>
</div>

<h2 class="text-center mb-4">📊 Election Results</h2>

<!-- RESULT LOGIC -->

{% if total_votes == 0 %}

<div class="winner-box">
<h2>❗ No votes yet</h2>
</div>

{% elif is_tie %}

<div class="winner-box">
<h2>🤝 It's a Tie!</h2>
</div>

{% elif winner %}

<div class="winner-box">
<h2>🏆 Winner: {{ winner[0] }}</h2>
<p>Party: {{ winner[1] }}</p>
<p>Votes: {{ winner[4] }}</p>
</div>

{% endif %}

<!-- BAR GRAPH -->

<div class="chart-box">
<canvas id="barChart"></canvas>
</div>

</div>

<script>

// Prepare data
const data = {{ candidates | tojson }};

const names = data.map(c => c[0]);
const votes = data.map(c => c[4]);

// Create Bar Chart
const ctx = document.getElementById('barChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: names,
        datasets: [{
            label: 'Votes',
            data: votes,
            borderWidth: 1
        }]
    },
    options: {
        indexAxis: 'y',   // 👉 makes it horizontal
        responsive: true,
        plugins: {
            legend: { display: false }
        },
        scales: {
            x: {
                beginAtZero: true,
                ticks: { color: 'white' }
            },
            y: {
                ticks: { color: 'white' }
            }
        }
    }
});


// 🎉 Confetti for winner
{% if winner %}
confetti({
particleCount:200,
spread:120,
origin:{y:0.6}
});
{% endif %}

</script>

</body>
</html>
